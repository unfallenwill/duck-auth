name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Generate OAuth keys
        run: npm run db:keys:init
        env:
          OAUTH_SESSION_SECRET: ci-test-secret-not-for-production-use-only-32b

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit -- --coverage

      - name: Build
        run: npm run build
        env:
          OAUTH_SESSION_SECRET: ci-test-secret-not-for-production-use-only-32b

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true